<div class="user">
  <div class="container d-flex justify-content-end align-items-center vh-100">
    <div class="card shadow-lg p-4" style="max-width: 400px; width: 100%">
      <h3 class="text-center mb-4">Customer Login</h3>
      <form (ngSubmit)="onLogin(loginForm)" #loginForm="ngForm" class="row">
        <!-- Username -->
        <div class="pt-2 col-md-12">
          <label> <i class="fa fa-user"></i> Username:</label>
          <input
            class="form-control"
            type="text"
            name="username"
            [(ngModel)]="login.username"
            required
            minlength="3"
            #uname="ngModel"
          />
          <div class="text-danger" *ngIf="uname.invalid && uname.touched">
            Username is required and must be at least 3 characters.
          </div>
        </div>

        <!-- Password -->
        <div class="pt-2 col-md-12">
          <label> <i class="fa fa-lock"></i> Password:</label>
          <input
            class="form-control"
            type="password"
            name="password"
            [(ngModel)]="login.password"
            required
            minlength="6"
            #pwd="ngModel"
          />
          <div class="text-danger" *ngIf="pwd.invalid && pwd.touched">
            Password is required and must be at least 6 characters.
          </div>
        </div>

        <!-- Buttons -->
        <div class="col-md-12 pt-3">
          <button type="submit" class="btn btn-sm btn-success" [disabled]="loginForm.invalid">
            Login
          </button>
          <button type="reset" class="btn btn-sm btn-danger mx-3">Cancel</button>
        </div>
      </form>
      <div class="text-center mt-3">
        <a [routerLink]="'/user-register'" class="text-decoration-none">Create Account</a>
      </div>
    </div>
  </div>
</div>
